<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Packet Sentinels | Network Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a0a2e, #0a0a1a, #000);
            color: #ff2d95;
            font-family: 'Segoe UI', 'Courier New', monospace;
            text-align: center;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* ===== HEADER ===== */
        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 30px #ff2d95, 0 0 60px #00d4ff, 0 0 90px #ff2d95;
            color: #fff;
            background: linear-gradient(135deg, #ff2d95, #c44dff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header h3 {
            font-size: 1.5rem;
            font-weight: 300;
            color: #c44dff;
            text-shadow: 0 0 20px #c44dff, 0 0 40px #00d4ff;
            letter-spacing: 2px;
            margin-top: 0.2rem;
        }

        .header .sub-line {
            width: 120px;
            height: 3px;
            margin: 0.8rem auto 0;
            background: linear-gradient(90deg, #ff2d95, #00d4ff);
            border-radius: 10px;
            box-shadow: 0 0 20px #ff2d95;
        }

        /* ===== UPLOAD CARD ===== */
        .upload-card {
            background: rgba(13, 13, 36, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 45, 149, 0.3);
            border-radius: 30px;
            padding: 2rem 2.5rem;
            max-width: 750px;
            width: 100%;
            margin: 0 auto 2.5rem;
            box-shadow: 0 0 40px rgba(255, 45, 149, 0.15), 0 0 80px rgba(0, 212, 255, 0.05);
            transition: 0.4s ease;
        }

        .upload-card:hover {
            box-shadow: 0 0 60px rgba(255, 45, 149, 0.25), 0 0 120px rgba(0, 212, 255, 0.1);
            border-color: #ff2d95;
        }

        .upload-card form {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        /* ===== FILE INPUT ===== */
        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-block;
            padding: 0.7rem 1.8rem;
            background: #111;
            color: #ff2d95;
            border: 2px solid #ff2d95;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(255, 45, 149, 0.3);
            transition: 0.3s ease;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .file-input-label:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff2d95, 0 0 80px #00d4ff;
            background: #1a1a3e;
        }

        .file-name {
            color: #aaa;
            font-size: 0.9rem;
            margin-left: 0.5rem;
            min-width: 100px;
            text-align: left;
        }

        /* ===== BUTTON ===== */
        .btn-upload {
            padding: 0.8rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff2d95, #c44dff);
            color: #fff;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(255, 45, 149, 0.4), 0 0 60px rgba(0, 212, 255, 0.2);
            cursor: pointer;
            transition: 0.3s ease;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-upload:hover {
            transform: scale(1.06) translateY(-2px);
            box-shadow: 0 0 50px #ff2d95, 0 0 100px #00d4ff;
        }

        .btn-upload:active {
            transform: scale(0.96);
        }

        /* ===== CHARTS SECTION ===== */
        #charts {
            display: none;
            width: 100%;
            max-width: 1100px;
            margin-top: 2rem;
        }

        .chart-card {
            background: rgba(13, 13, 36, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 45, 149, 0.2);
            border-radius: 30px;
            padding: 1.5rem 1.5rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 0 30px rgba(255, 45, 149, 0.08);
            transition: 0.4s ease;
        }

        .chart-card:hover {
            border-color: #ff2d95;
            box-shadow: 0 0 50px rgba(255, 45, 149, 0.15), 0 0 100px rgba(0, 212, 255, 0.05);
        }

        .chart-card h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 20px #ff2d95, 0 0 40px #00d4ff;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .chart-card h2 i {
            color: #00d4ff;
            margin-right: 10px;
        }

        canvas {
            background: #0d0d24;
            padding: 0.8rem;
            border-radius: 20px;
            max-width: 100%;
            height: auto !important;
            border: 1px solid rgba(255, 45, 149, 0.15);
            box-shadow: inset 0 0 30px rgba(255, 45, 149, 0.03);
            transition: 0.3s ease;
        }

        canvas:hover {
            border-color: #ff2d95;
            box-shadow: 0 0 40px rgba(255, 45, 149, 0.1), inset 0 0 30px rgba(255, 45, 149, 0.05);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .header h3 {
                font-size: 1.1rem;
            }
            .upload-card {
                padding: 1.5rem 1rem;
            }
            .upload-card form {
                flex-direction: column;
                gap: 0.8rem;
            }
            .btn-upload {
                width: 100%;
                justify-content: center;
            }
            .file-input-label {
                width: 100%;
                text-align: center;
            }
            .file-name {
                min-width: auto;
                text-align: center;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff2d95, #00d4ff);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff2d95;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <div class="header">
        <h1>⚡ Packet Sentinels</h1>
        <h3>〈 Network Traffic Analyzer 〉</h3>
        <div class="sub-line"></div>
    </div>

    <!-- ===== UPLOAD CARD ===== -->
    <div class="upload-card">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="file-input-wrapper">
                <span class="file-input-label">📁 Choose File</span>
                <input type="file" name="file" accept=".csv" required id="fileInput" />
            </div>
            <span class="file-name" id="fileName">No file chosen</span>
            <button type="submit" class="btn-upload">
                <span>🚀</span> Upload & Analyze
            </button>
        </form>
    </div>

    <!-- ===== CHARTS ===== -->
    <div id="charts">
        <div class="chart-card">
            <h2><i>📊</i> Top Source IPs</h2>
            <canvas id="sourceChart"></canvas>
        </div>
        <div class="chart-card">
            <h2><i>📡</i> Top Protocols</h2>
            <canvas id="protocolChart"></canvas>
        </div>
    </div>

    <script>
        // ===== FILE NAME DISPLAY =====
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const name = e.target.files[0]?.name || 'No file chosen';
            document.getElementById('fileName').textContent = name;
        });

        // ===== FORM SUBMIT =====
        const form = document.getElementById('uploadForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    alert(errorText || 'Upload failed. Please try again.');
                    return;
                }

                const data = await res.json();

                // Validate data
                if (!data.top_sources || !data.top_protocols) {
                    alert('Invalid data received from server.');
                    return;
                }

                // Show charts section
                const chartsDiv = document.getElementById('charts');
                chartsDiv.style.display = 'block';

                // Destroy existing charts if any
                if (window.sourceChartInstance) {
                    window.sourceChartInstance.destroy();
                }
                if (window.protocolChartInstance) {
                    window.protocolChartInstance.destroy();
                }

                // ===== GRADIENT FOR BARS =====
                const getGradient = (ctx) => {
                    const grad = ctx.createLinearGradient(0, 0, 0, 400);
                    grad.addColorStop(0, '#ff2d95');
                    grad.addColorStop(1, '#00d4ff');
                    return grad;
                };

                // ===== SOURCE IP CHART =====
                const sourceCtx = document.getElementById('sourceChart').getContext('2d');
                window.sourceChartInstance = new Chart(sourceCtx, {
                    type: 'bar',
                    data: {
                        labels: data.top_sources.labels || [],
                        datasets: [{
                            label: 'Top Source IPs',
                            data: data.top_sources.counts || [],
                            backgroundColor: getGradient(sourceCtx),
                            borderColor: '#ff2d95',
                            borderWidth: 2,
                            borderRadius: 10,
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#ff2d95',
                                    font: { size: 14, weight: 'bold' },
                                    boxWidth: 20,
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#00d4ff', font: { size: 12 } },
                                grid: { color: 'rgba(255,45,149,0.15)' }
                            },
                            x: {
                                ticks: { color: '#c44dff', font: { size: 11 } },
                                grid: { color: 'rgba(255,45,149,0.08)' }
                            }
                        }
                    }
                });

                // ===== PROTOCOL CHART =====
                const protocolCtx = document.getElementById('protocolChart').getContext('2d');
                window.protocolChartInstance = new Chart(protocolCtx, {
                    type: 'bar',
                    data: {
                        labels: data.top_protocols.labels || [],
                        datasets: [{
                            label: 'Top Protocols',
                            data: data.top_protocols.counts || [],
                            backgroundColor: getGradient(protocolCtx),
                            borderColor: '#00d4ff',
                            borderWidth: 2,
                            borderRadius: 10,
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#00d4ff',
                                    font: { size: 14, weight: 'bold' },
                                    boxWidth: 20,
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#ff2d95', font: { size: 12 } },
                                grid: { color: 'rgba(0,212,255,0.15)' }
                            },
                            x: {
                                ticks: { color: '#ff2d95', font: { size: 11 } },
                                grid: { color: 'rgba(0,212,255,0.08)' }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while uploading the file. Please try again.');
            }
        });
    </script>

</body>
  </html>
